name: Refresh GitHub Stats

# Pre-renders the profile stat cards into static SVGs committed to this repo.
# The README points at those static files, so it NEVER shows a live
# "rate limit / failed" card to visitors. If every source is rate-limited on a
# given run, the refresh script keeps the last-good SVGs untouched.

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours (offset :17 to dodge top-of-hour load)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh stat SVGs (multi-source fallback, keep-last-good)
        run: bash .github/scripts/refresh-stats.sh

      - name: Commit updated SVGs (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --cached --quiet; then
            echo "No changes — stats unchanged or all sources rate-limited (kept last-good)."
            exit 0
          fi
          git commit -m "chore: refresh GitHub stat cards [skip ci]"
          # Push with rebase-retry to survive a concurrent push to main.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed refreshed stat cards (attempt $attempt)."
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing on latest main and retrying..."
            git pull --rebase --autostash origin main || true
            sleep 3
          done
          echo "::error::Failed to push refreshed stat cards after 5 attempts."
          exit 1
